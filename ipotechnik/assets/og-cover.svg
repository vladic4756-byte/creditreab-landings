<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="КредитРеабилитация — восстановление кредитного рейтинга для ипотеки">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E3A8A"/><stop offset="1" stop-color="#0F2155"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0EA5E9"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(96,120)">
    <rect width="56" height="56" rx="14" fill="#0EA5E9"/>
    <path d="M14 38c4-9 9-13 14-13 3.5 0 5.6 2.3 7 5" stroke="#fff" stroke-width="4" stroke-linecap="round" fill="none"/>
    <text x="76" y="38" font-family="Lexend, Arial, sans-serif" font-size="34" font-weight="700" fill="#fff">КредитРеабилитация</text>
  </g>
  <text x="96" y="320" font-family="Lexend, Arial, sans-serif" font-size="64" font-weight="700" fill="#fff">Просрочку закрыли,</text>
  <text x="96" y="392" font-family="Lexend, Arial, sans-serif" font-size="64" font-weight="700" fill="#7DD3FC">а ипотеку не дают?</text>
  <text x="96" y="470" font-family="IBM Plex Sans, Arial, sans-serif" font-size="32" fill="#CBD5E1">Поднимем рейтинг на 150–400 баллов за 6–9 месяцев</text>
  <text x="96" y="512" font-family="IBM Plex Sans, Arial, sans-serif" font-size="32" fill="#CBD5E1">или вернём 100% стоимости. Законно, через БКИ.</text>
  <g transform="translate(820,250)">
    <path d="M0 180 A150 150 0 0 1 300 180" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="24" stroke-linecap="round"/>
    <path d="M0 180 A150 150 0 0 1 250 50" fill="none" stroke="url(#arc)" stroke-width="24" stroke-linecap="round"/>
    <text x="150" y="170" text-anchor="middle" font-family="Lexend, Arial, sans-serif" font-size="60" font-weight="700" fill="#fff">720</text>
    <text x="150" y="205" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" fill="#7DD3FC">баллов ПКР</text>
  </g>
</svg>
