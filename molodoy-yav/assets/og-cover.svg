<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="ЯВЬ — мифы о кредитной истории: миф или правда">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#16384a"/>
      <stop offset="60%" stop-color="#0F1620"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(80,86)">
    <rect width="46" height="46" rx="11" fill="#172230"/>
    <path d="M12 13l11 22 11-22" stroke="#22C55E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="64" y="34" font-family="Inter,Segoe UI,sans-serif" font-size="34" font-weight="800" fill="#EAF1F8" letter-spacing="1">ЯВЬ</text>
  </g>
  <text x="80" y="250" font-family="Inter,Segoe UI,sans-serif" font-size="68" font-weight="800" fill="#EAF1F8">Мифы о кредитной</text>
  <text x="80" y="328" font-family="Inter,Segoe UI,sans-serif" font-size="68" font-weight="800" fill="#EAF1F8">истории: <tspan fill="#22C55E">миф или правда?</tspan></text>
  <text x="80" y="392" font-family="Inter,Segoe UI,sans-serif" font-size="30" font-weight="500" fill="#B7C6D6">Нулевая история = хорошая? Просрочка исчезнет сама?</text>
  <text x="80" y="432" font-family="Inter,Segoe UI,sans-serif" font-size="30" font-weight="500" fill="#B7C6D6">Разбираем по фактам НБКИ и 218-ФЗ. Без балла и скоринга.</text>
  <g transform="translate(80,500)">
    <rect width="280" height="64" rx="14" fill="#11281C" stroke="#1E5337"/>
    <text x="26" y="41" font-family="IBM Plex Mono,monospace" font-size="28" font-weight="600" fill="#7BE8A8">+150–400 / 6–9 мес</text>
    <rect x="306" width="220" height="64" rx="14" fill="#172230" stroke="#28384C"/>
    <text x="332" y="41" font-family="Inter,sans-serif" font-size="24" font-weight="600" fill="#B7C6D6">или вернём 100%</text>
  </g>
