<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ДОСТУП — что вам уже доступно после банкротства. Восстановление кредитного рейтинга: +150–400 баллов за 6–9 месяцев или возврат 100%.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E231F"/>
      <stop offset=".6" stop-color="#14302B"/>
      <stop offset="1" stop-color="#173a32"/>
    </linearGradient>
    <radialGradient id="glow" cx="88%" cy="6%" r="60%">
      <stop offset="0" stop-color="#7DD3A8" stop-opacity=".22"/>
      <stop offset="1" stop-color="#7DD3A8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand -->
  <g transform="translate(80,76)">
    <rect width="46" height="46" rx="11" fill="#1B3E37"/>
    <path d="M17 22v-4a6 6 0 0 1 12 0" stroke="#7DD3A8" stroke-width="3.2" fill="none" stroke-linecap="round"/>
    <rect x="13" y="22" width="20" height="15" rx="3.6" fill="#F4B860"/>
    <circle cx="23" cy="28" r="2.4" fill="#14302B"/>
    <text x="62" y="32" font-family="Manrope, Arial, sans-serif" font-size="30" font-weight="800" fill="#FFFFFF" letter-spacing="1">ДОСТУП</text>
  </g>

  <text x="80" y="230" font-family="Manrope, Arial, sans-serif" font-size="62" font-weight="800" fill="#FFFFFF" letter-spacing="-1">Что вам уже доступно</text>
  <text x="80" y="304" font-family="Manrope, Arial, sans-serif" font-size="62" font-weight="800" fill="#F4B860" letter-spacing="-1">после банкротства</text>
  <text x="80" y="368" font-family="Manrope, Arial, sans-serif" font-size="30" font-weight="500" fill="#CFE2DA">Карта доступности банковских продуктов — шаг за шагом</text>

  <!-- ladder of locks -->
  <g transform="translate(80,420)" font-family="Manrope, Arial, sans-serif">
    <g>
      <rect width="320" height="48" rx="12" fill="#0E8F60"/>
      <circle cx="28" cy="24" r="9" fill="none" stroke="#fff" stroke-width="2.4"/><path d="M24 24l3 3 5-6" stroke="#fff" stroke-width="2.4" fill="none"/>
      <text x="52" y="31" font-size="21" font-weight="700" fill="#fff">Карта / счёт · доступно</text>
    </g>
    <g transform="translate(0,60)">
      <rect width="320" height="48" rx="12" fill="rgba(244,184,96,.18)" stroke="#F4B860" stroke-width="1.5"/>
      <circle cx="28" cy="24" r="9" fill="none" stroke="#F4B860" stroke-width="2.4"/><path d="M28 19v5l3 2" stroke="#F4B860" stroke-width="2.4" fill="none"/>
      <text x="52" y="31" font-size="21" font-weight="700" fill="#F4B860">Стартовая карта · ориентир</text>
    </g>
    <g transform="translate(0,120)">
      <rect width="320" height="48" rx="12" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>
      <circle cx="28" cy="24" r="9" fill="none" stroke="#9aaaa3" stroke-width="2.4"/><path d="M24 24h8" stroke="#9aaaa3" stroke-width="2.4"/>
      <text x="52" y="31" font-size="21" font-weight="700" fill="#9aaaa3">Ипотека · горизонт</text>
    </g>
  </g>

  <!-- offer pill -->
  <g transform="translate(720,470)">
    <rect width="400" height="96" rx="18" fill="rgba(125,211,168,.12)" stroke="rgba(125,211,168,.34)" stroke-width="1.5"/>
    <text x="28" y="44" font-family="IBM Plex Mono, monospace" font-size="34" font-weight="600" fill="#F4B860">+150–400 баллов</text>
    <text x="28" y="76" font-family="Manrope, Arial, sans-serif" font-size="21" font-weight="600" fill="#CFE2DA">за 6–9 мес · или возврат 100%</text>
  </g>

  <text x="80" y="600" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="500" fill="#85a397">Законно · формируем новые положительные записи в БКИ · creditreab.ru</text>
</svg>
