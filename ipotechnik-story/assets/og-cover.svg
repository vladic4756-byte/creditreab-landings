<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Семь месяцев Андрея — история восстановления кредитного рейтинга для ипотеки">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F2E9"/>
      <stop offset="1" stop-color="#EFE7D7"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E3A5F"/>
      <stop offset="1" stop-color="#274B7A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="64" y="64" width="1072" height="502" fill="none" stroke="#C9B79A" stroke-width="2"/>
  <text x="100" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="6" fill="#9A7B4F">КРЕДИТРЕАБИЛИТАЦИЯ · ИСТОРИЯ</text>
  <text x="98" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="118" font-weight="700" fill="#1E2A3A">Семь месяцев</text>
  <text x="98" y="408" font-family="Georgia, 'Times New Roman', serif" font-size="118" font-style="italic" font-weight="700" fill="url(#ink)">Андрея</text>
  <line x1="100" y1="452" x2="560" y2="452" stroke="#C9B79A" stroke-width="2"/>
  <text x="100" y="500" font-family="Georgia, serif" font-size="27" fill="#3A4656">Просрочку закрыл. Ипотеку всё равно не дают.</text>
  <text x="100" y="536" font-family="Georgia, serif" font-size="27" fill="#3A4656">Как он поднял рейтинг — законно.</text>
  <g transform="translate(820,150)">
    <rect x="0" y="0" width="280" height="320" rx="4" fill="#FFFFFF" stroke="#D8CBB3" stroke-width="2"/>
    <rect x="24" y="34" width="232" height="14" rx="2" fill="#E3D9C6"/>
    <rect x="24" y="70" width="180" height="10" rx="2" fill="#ECE3D2"/>
    <rect x="24" y="96" width="210" height="10" rx="2" fill="#ECE3D2"/>
    <rect x="24" y="122" width="150" height="10" rx="2" fill="#ECE3D2"/>
    <text x="40" y="232" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#1E7A4A">+280</text>
    <text x="40" y="266" font-family="Georgia, serif" font-size="20" fill="#6B5A3E">баллов ПКР</text>
    <text x="140" y="180" transform="rotate(-20 140 180)" font-family="Georgia, serif" font-size="22" letter-spacing="3" fill="#1E3A5F" opacity="0.16" font-weight="700">ОБРАЗЕЦ</text>
  </g>
