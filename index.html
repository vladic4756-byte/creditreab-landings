<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>КредитРеабилитация — анализатор лендингов</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231d4ed8'/%3E%3Ctext x='7' y='23' font-size='17' fill='white' font-family='sans-serif' font-weight='bold'%3EК%3C/text%3E%3C/svg%3E"/>
<style>
:root{
  --bg:#0e1320; --panel:#161d2e; --panel2:#1d2740; --line:#283353; --ink:#e8edf7;
  --mut:#8a97b5; --accent:#4b8cff; --good:#37d39b; --warn:#ffb84d; --bad:#ff6b6b;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,"Segoe UI",Roboto,Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.mono{font-family:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace}
button{font:inherit;color:inherit;cursor:pointer;border:0;background:none}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

.app{display:grid;grid-template-columns:268px 1fr 340px;grid-template-rows:56px 1fr;height:100vh;height:100dvh}
header{grid-column:1/-1;display:flex;align-items:center;gap:1rem;padding:0 1rem;border-bottom:1px solid var(--line);background:var(--panel)}
.brand{display:flex;align-items:center;gap:.55rem;font-weight:800;letter-spacing:-.01em}
.brand .m{width:1.7rem;height:1.7rem;border-radius:.5rem;background:linear-gradient(135deg,#4b8cff,#1d4ed8);display:grid;place-items:center;color:#fff;font-weight:800}
.brand small{display:block;font-weight:500;color:var(--mut);font-size:.7rem;letter-spacing:.02em}
.htools{margin-left:auto;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px}
.seg button{padding:.32rem .6rem;border-radius:7px;color:var(--mut);font-size:.82rem;font-weight:600}
.seg button[aria-pressed=true]{background:var(--accent);color:#fff}
.tbtn{padding:.4rem .7rem;border:1px solid var(--line);border-radius:9px;background:var(--panel2);color:var(--ink);font-size:.82rem;font-weight:600}
.tbtn:hover{border-color:var(--accent)}
.tbtn[aria-pressed=true]{background:var(--accent);border-color:var(--accent);color:#fff}

.rail{border-right:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:.6rem}
.grp{margin:.5rem .2rem .3rem;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut)}
.item{width:100%;text-align:left;padding:.55rem .6rem;border-radius:10px;margin-bottom:3px;border:1px solid transparent;display:flex;flex-direction:column;gap:.2rem}
.item:hover{background:var(--panel2)}
.item[aria-current=true]{background:var(--panel2);border-color:var(--accent)}
.item.cmp[aria-current=true]{border-color:var(--warn)}
.item .t{display:flex;align-items:center;gap:.4rem;font-weight:600;font-size:.9rem}
.item .s{color:var(--mut);font-size:.74rem}
.chip{font-size:.62rem;font-weight:700;padding:.08rem .36rem;border-radius:6px;letter-spacing:.02em}
.chip.new{background:rgba(75,140,255,.18);color:#9cc0ff}
.chip.base{background:rgba(138,151,181,.18);color:var(--mut)}
.lhmini{display:flex;gap:.22rem;margin-top:.15rem}
.dot{width:1.45rem;height:1.45rem;border-radius:50%;display:grid;place-items:center;font-size:.64rem;font-weight:700}
.g{background:rgba(55,211,155,.16);color:var(--good)} .y{background:rgba(255,184,77,.16);color:var(--warn)} .r{background:rgba(255,107,107,.16);color:var(--bad)}

.stage{position:relative;display:flex;flex-direction:column;min-width:0;background:#0a0e18}
.stagebar{display:flex;align-items:center;gap:.6rem;padding:.5rem .8rem;border-bottom:1px solid var(--line);background:var(--panel);font-size:.82rem}
.stagebar .url{color:var(--mut)}
.frames{flex:1;overflow:auto;display:flex;gap:14px;justify-content:center;align-items:stretch;padding:16px;background:repeating-linear-gradient(45deg,#0a0e18,#0a0e18 10px,#0c1119 10px,#0c1119 20px)}
.device{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px -20px rgba(0,0,0,.7);flex:0 0 auto;transition:width .2s}
.device.flex1{flex:1 1 0;min-width:0}
.device iframe{width:100%;height:100%;border:0;display:block;background:#fff}
@media (max-width:1100px){
  .app{grid-template-columns:1fr;grid-template-rows:auto auto auto auto}
  .rail{max-height:32vh;border-right:0;border-bottom:1px solid var(--line)}
  .panel{border-left:0;border-top:1px solid var(--line)}
  .stage{min-height:62vh}
}

.panel{border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:1rem}
.panel h2{margin:.2rem 0 .1rem;font-size:1.12rem;letter-spacing:-.01em}
.panel .sub{color:var(--mut);font-size:.82rem;margin-bottom:.8rem}
.kv{margin:.7rem 0}
.kv .k{font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin-bottom:.2rem}
.kv .v{font-size:.9rem}
.lhrow{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:.5rem 0}
.score{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:.5rem .6rem}
.score .n{font-size:1.3rem;font-weight:800}
.score .c{font-size:.66rem;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.gates{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.3rem}
.gate{font-size:.72rem;padding:.2rem .45rem;border-radius:7px;background:rgba(55,211,155,.14);color:var(--good);font-weight:600}
.stars{color:var(--accent);letter-spacing:2px}
.legal{font-size:.84rem;padding:.5rem .6rem;border-radius:9px;background:rgba(55,211,155,.1);border:1px solid rgba(55,211,155,.25)}
.open{display:inline-flex;align-items:center;gap:.35rem;margin-top:.5rem;font-weight:600}
.note{margin-top:1rem;padding-top:.7rem;border-top:1px solid var(--line);color:var(--mut);font-size:.76rem}
.hint{margin:auto;color:var(--mut);font-size:.9rem;text-align:center;padding:2rem;max-width:36ch}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand"><span class="m">К</span><span>КредитРеабилитация<small>анализатор лендингов · 9 версий</small></span></div>
    <div class="htools">
      <div class="seg" role="group" aria-label="Ширина устройства">
        <button data-dev="360" aria-pressed="false">📱 360</button>
        <button data-dev="768" aria-pressed="false">▭ 768</button>
        <button data-dev="full" aria-pressed="true">🖥 Full</button>
      </div>
      <button class="tbtn" id="cmpBtn" aria-pressed="false">⇄ Сравнить</button>
      <button class="tbtn" id="reload" title="Перезагрузить превью">⟳</button>
    </div>
  </header>

  <nav class="rail" id="rail" aria-label="Список лендингов"></nav>

  <main class="stage">
    <div class="stagebar">
      <span id="stageTitle">Выберите лендинг</span>
      <span class="url mono" id="stageUrl"></span>
      <a class="tbtn" id="openTab" style="margin-left:auto" target="_blank" rel="noopener">Открыть ↗</a>
    </div>
    <div class="frames" id="frames"><div class="hint">← Выберите лендинг слева — откроется превью и QA-метрики.<br><br>Кнопка «⇄ Сравнить» — выбрать два и сопоставить бок о бок (например классический ипотечник vs концепт «Карта выхода»).</div></div>
  </main>

  <aside class="panel" id="panel"><div class="hint">Метаданные и QA-метрики появятся здесь.</div></aside>
</div>

<script>
var DATA=[
 {id:"ipotechnik", brand:"РЕЙТУМ", tagline:"Ваш кредитный рейтинг — под контролем", domain:"reitum.ru", seg:"Ипотечник в ловушке", name:"Классический", base:true,
  concept:"clean / банковский", arch:"scroll-snap statements + score-gauge + 3-шаговый квиз",
  mech:"score-gauge 480→720 (hero) и пошаговый квиз-форма",
  lh:[86,100,100,100], axe:0, contract:0, distinct:null,
  legal:"чисто · оффер +150–400/6–9мес/возврат 100% · «деньги не на руки»"},

 {id:"ipotechnik-plan", brand:"ТРАЕКТО", tagline:"Персональный маршрут к нужному рейтингу", domain:"traekto.ru", seg:"Ипотечник в ловушке", name:"«Карта выхода» — инструмент", win:true,
  concept:"tool-canvas (победитель дивергенции)", arch:"страница-инструмент, не свиток",
  mech:"построитель персонального маршрута 6–9 мес: вехи записей в БКИ + коридор-вилка прогноза, PDF-план до заявки",
  lh:[75,100,100,100], axe:0, contract:0, distinct:5,
  legal:"чисто · прогноз помечен «не гарантия» · вилка мин–макс · оффер вшит в механику"},

 {id:"ipotechnik-story", brand:"Семь месяцев", tagline:"История одного восстановления — шаг за шагом", domain:"7mesyacev.ru", seg:"Ипотечник в ловушке", name:"«Семь месяцев» — лонгрид", isnew:true,
  concept:"editorial scrollytelling", arch:"нарратив одного героя, 9 глав",
  mech:"история отказ→план→одобрение; sticky-документы до/после; юр-ограничения как повороты сюжета",
  lh:[71,100,100,100], axe:0, contract:0, distinct:5, legal:"чисто · история помечена «собирательная/образец» · оффер вшит в сюжет"},

 {id:"ipotechnik-paths", brand:"ЯСНО", tagline:"Сравните пути честно — решайте сами", domain:"yasno-reiting.ru", seg:"Ипотечник в ловушке", name:"«4 дороги» — сравнение", isnew:true,
  concept:"decision engine", arch:"интерактивный сравнитель 4 путей",
  mech:"4 пути × 5 симметричных осей; калибровка → вердикт (может указать НЕ на нас)",
  lh:[88,100,100,100], axe:0, contract:0, distinct:4, legal:"чисто · сравнит. реклама без имён конкурентов · числа «оценка» · в 2/12 вердикт уводит к «сам»"},

 {id:"ipotechnik-dialog", brand:"НАЕДИНЕ", tagline:"Разговор о рейтинге — наедине, без осуждения", domain:"naedine-pkr.ru", seg:"Ипотечник в ловушке", name:"«Без свидетелей» — диалог", isnew:true,
  concept:"анти-лендинг", arch:"ветвящийся диалог с куратором",
  mech:"реплики-боль от первого лица; оффер репликами; контакт необязателен",
  lh:[89,96,100,100], axe:0, contract:0, distinct:5, legal:"чисто · юр-обязательное на всех 4 ветках (общий узел) · контакт необязателен"},

 {id:"bankrot-dostup", brand:"ДОСТУП", tagline:"Понятно, что вам уже доступно — шаг за шагом", domain:"dostup-reiting.ru",
  seg:"После банкротства", name:"«Что вам уже можно» — движок доступности", isnew:true,
  concept:"eligibility engine (победитель дивергенции, Σ20)", arch:"decision-engine, реактивная карта доступности продуктов",
  mech:"2 контрола → лента продуктов-замков (доступно сейчас / ≈через N мес / что ускоряет); картина доступности до заявки",
  lh:[86,100,100,100], axe:0, contract:0, distinct:4,
  legal:"чисто · всё «оценка, не гарантия» · ФЗ-332-safe · честная линия «статус 5 лет остаётся»"},

 {id:"molodoy-yav", brand:"ЯВЬ", tagline:"Кредитная история — как есть на самом деле", domain:"yav-reiting.ru",
  seg:"Молодой с историей", name:"«Миф или правда» — разрушитель мифов", win:true,
  concept:"card-deck (победитель дивергенции, Σ24 · Distinct 5)", arch:"движок мифов на <details>/CSS, не квиз",
  mech:"голос Миф/Правда по 6 убеждениям → вскрытие + источник НБКИ/218-ФЗ; без персонального балла",
  lh:[97,100,100,100], axe:0, contract:0, distinct:5,
  legal:"чисто · источники реальные · юр-константы как карточки-Правды"},

 {id:"bankrot", brand:"ЗАНОВО", tagline:"Финансовая жизнь — заново, законно", domain:"zanovo-reiting.ru", seg:"После банкротства", name:"Editorial photo-led", concept:"B · editorial",
  arch:"scrollytelling + горизонт-лента + masonry, фото", mech:"человечная подача, ФЗ-332 safe, score-gauge как деталь",
  lh:[84,100,96,100], axe:0, contract:0, distinct:null,
  legal:"чисто · ФЗ-332 разрешён (услуга ≠ банкротство) · оффер+гарантия"},

 {id:"molodoy", brand:"РОСТОК", tagline:"Рейтинг с нуля — без клейма", domain:"rostok-reiting.ru", seg:"Молодой с историей", name:"Data-driven dashboard", concept:"C · dashboard",
  arch:"bento + табы + pinned-scrub", mech:"интерактивный калькулятор рейтинга, моноцифры",
  lh:[100,100,100,100], axe:0, contract:0, distinct:null,
  legal:"чисто · числа калькулятора зажаты в оффер · «деньги не на руки»"}
];

var SEGS=["Ипотечник в ловушке","После банкротства","Молодой с историей"];
var rail=document.getElementById("rail"), frames=document.getElementById("frames"), panel=document.getElementById("panel");
var dev="full", cmp=false, cur=null, cmpSel=[];

function lhClass(n){return n>=90?"g":n>=70?"y":"r";}
function lhDot(n){return '<span class="dot '+lhClass(n)+'">'+(n==null?"·":n)+'</span>';}

function buildRail(){
  rail.innerHTML="";
  SEGS.forEach(function(seg){
    var g=document.createElement("div");g.className="grp";g.textContent=seg;rail.appendChild(g);
    DATA.filter(function(d){return d.seg===seg;}).forEach(function(d){
      var b=document.createElement("button");b.className="item"+(cmp?" cmp":"");b.dataset.id=d.id;b.type="button";
      var tag=d.win?'<span class="chip new">★ концепт</span>':d.base?'<span class="chip base">база</span>':d.isnew?'<span class="chip new">концепт</span>':'';
      var dots=d.lh?'<div class="lhmini">'+d.lh.map(lhDot).join("")+'</div>':'<div class="lhmini"><span class="dot y">…</span></div>';
      b.innerHTML='<span class="t">'+(d.brand||d.name)+' '+tag+'</span><span class="s">'+d.name+' · '+d.concept+'</span>'+dots;
      b.addEventListener("click",function(){ cmp?toggleCmp(d):select(d); });
      rail.appendChild(b);
    });
  });
  markRail();
}
function markRail(){
  [].forEach.call(rail.querySelectorAll(".item"),function(el){
    var on = cmp ? cmpSel.indexOf(el.dataset.id)>-1 : (cur&&cur.id===el.dataset.id);
    el.setAttribute("aria-current", on?"true":"false");
  });
}
function devWidth(){return dev==="full"?null:parseInt(dev,10);}
function frameFor(d,flex){
  var w=devWidth();
  var wrap=document.createElement("div");wrap.className="device"+(w?"":(flex?" flex1":""));
  if(w) wrap.style.width=w+"px"; else if(!flex) wrap.style.width="100%";
  var f=document.createElement("iframe");f.src="./"+d.id+"/";f.title=d.name;f.loading="lazy";
  wrap.appendChild(f);return wrap;
}
function render(){
  frames.innerHTML="";
  var list = cmp ? cmpSel.map(function(id){return DATA.filter(function(d){return d.id===id})[0];}) : (cur?[cur]:[]);
  if(!list.length){frames.innerHTML='<div class="hint">'+(cmp?'Выберите ДВА лендинга для сравнения.':'← Выберите лендинг.')+'</div>';return;}
  list.forEach(function(d){ frames.appendChild(frameFor(d,cmp)); });
}
function select(d){cur=d;renderPanel(d);render();markRail();
  document.getElementById("stageTitle").textContent=d.seg+" — "+d.name;
  document.getElementById("stageUrl").textContent="/"+d.id+"/";
  document.getElementById("openTab").href="./"+d.id+"/";
}
function toggleCmp(d){
  var i=cmpSel.indexOf(d.id);
  if(i>-1)cmpSel.splice(i,1); else {cmpSel.push(d.id);if(cmpSel.length>2)cmpSel.shift();}
  markRail();render();
  if(cmpSel.length){var dd=DATA.filter(function(x){return x.id===cmpSel[cmpSel.length-1]})[0];renderPanel(dd);}
}
function stars(n){var s="";for(var i=0;i<5;i++)s+=i<n?"★":"☆";return s;}
function renderPanel(d){
  var lh=d.lh, cats=["Perf","A11y","Best","SEO"];
  var lhHtml = lh ? '<div class="lhrow">'+lh.map(function(n,i){return '<div class="score"><div class="n" style="color:'+(n>=90?"var(--good)":n>=70?"var(--warn)":"var(--bad)")+'">'+n+'</div><div class="c">'+cats[i]+'</div></div>';}).join("")+'</div>'
                 : '<div class="kv"><div class="v" style="color:var(--mut)">Строится — Lighthouse появится после прохождения QA-гейта…</div></div>';
  var gates = (d.contract!=null) ? '<div class="gates"><span class="gate">контракт 0</span><span class="gate">html-validate 0</span><span class="gate">integrity 0</span><span class="gate">axe '+d.axe+'</span></div>' : '';
  panel.innerHTML =
    '<h2>'+(d.brand||d.name)+'</h2>'+
    '<div class="sub">'+(d.tagline?'«'+d.tagline+'»':'')+'</div>'+
    '<div class="kv"><div class="k">Концепт лендинга</div><div class="v">'+d.name+' · '+d.seg+(d.win?' · 🏆 победитель':'')+(d.base?' · точка отсчёта':'')+'</div></div>'+
    (d.domain?'<div class="kv"><div class="k">Домен (проверить)</div><div class="v mono">'+d.domain+'</div></div>':'')+
    (d.distinct!=null?'<div class="kv"><div class="k">Distinctness (новизна)</div><div class="v"><span class="stars">'+stars(d.distinct)+'</span> '+d.distinct+'/5</div></div>':'')+
    '<div class="kv"><div class="k">Архетип</div><div class="v">'+d.arch+'</div></div>'+
    '<div class="kv"><div class="k">Центральный механизм</div><div class="v">'+d.mech+'</div></div>'+
    '<div class="kv"><div class="k">Lighthouse (мобайл)</div></div>'+lhHtml+gates+
    '<div class="kv"><div class="k">Юр-статус</div><div class="legal">'+(d.legal||'—')+'</div></div>'+
    '<a class="tbtn open" href="./'+d.id+'/" target="_blank" rel="noopener">Открыть лендинг ↗</a>'+
    '<div class="note">QA-метрики — из <span class="mono">audit_landing.sh</span> (контракт + html-validate + integrity + axe + Lighthouse). Превью: аналитика и форма — заглушки.</div>';
}

document.querySelectorAll(".seg button").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll(".seg button").forEach(function(x){x.setAttribute("aria-pressed","false")});
    b.setAttribute("aria-pressed","true");dev=b.dataset.dev;render();
  });
});
document.getElementById("cmpBtn").addEventListener("click",function(){
  cmp=!cmp;this.setAttribute("aria-pressed",cmp?"true":"false");cmpSel=[];buildRail();render();
  document.getElementById("stageTitle").textContent=cmp?"Режим сравнения — выберите 2":"Выберите лендинг";
  document.getElementById("stageUrl").textContent="";
});
document.getElementById("reload").addEventListener("click",function(){
  frames.querySelectorAll("iframe").forEach(function(f){f.src=f.src;});
});
buildRail();
</script>
</body>
</html>
